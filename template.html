<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好看 HAOKAN - K-POP资讯</title>
  <meta name="description" content="好看 HAOKAN - K-POP韩娱资讯平台，偶像新闻、音乐、时尚、生活">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      background: #fff;
      color: #333;
      font-size: 14px;
      line-height: 1.6;
    }

    a { color: #333; text-decoration: none; }
    a:hover { color: #ff2442; }
    img { display: block; max-width: 100%; }

    .wrap { max-width: 1000px; margin: 0 auto; padding: 0 12px; }

    /* === HEADER === */
    .site-header {
      background: #fff;
      border-bottom: 2px solid #ff2442;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1000px;
      margin: 0 auto;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: baseline; gap: 6px; }
    .logo-cn { font-size: 22px; font-weight: 700; color: #ff2442; }
    .logo-en { font-size: 13px; font-weight: 700; color: #ff2442; letter-spacing: 1px; }

    .header-nav { display: flex; gap: 0; }
    .header-nav a {
      padding: 6px 14px;
      font-size: 14px;
      color: #333;
      font-weight: 700;
    }
    .header-nav a:hover,
    .header-nav a.active { color: #ff2442; }

    /* === HERO === */
    .hero {
      border-bottom: 1px solid #eee;
      padding: 12px 0;
    }

    .hero a { display: flex; gap: 16px; align-items: flex-start; }
    .hero .hero-img {
      width: 420px;
      flex-shrink: 0;
      overflow: hidden;
      border-radius: 2px;
    }
    .hero .hero-img img { width: 100%; height: auto; aspect-ratio: 16/9; object-fit: cover; }
    .hero .hero-info { flex: 1; padding-top: 4px; }
    .hero .hero-cat {
      display: inline-block;
      background: #ff2442;
      color: #fff;
      font-size: 12px;
      padding: 1px 8px;
      border-radius: 2px;
      margin-bottom: 6px;
    }
    .hero .hero-info h2 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.5;
      color: #333;
      margin-bottom: 8px;
    }
    .hero .hero-meta { font-size: 12px; color: #999; }
    .hero .hero-meta span + span::before { content: ' | '; }

    /* === HOT TOPICS === */
    .hot-topics {
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .section-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .section-label {
      font-size: 15px;
      font-weight: 700;
      color: #ff2442;
      border-left: 3px solid #ff2442;
      padding-left: 8px;
    }

    .hot-topics-list { display: flex; flex-wrap: wrap; gap: 6px; }

    .topic-pill {
      display: inline-block;
      padding: 3px 10px;
      border: 1px solid #ddd;
      border-radius: 2px;
      font-size: 12px;
      color: #666;
      background: #fafafa;
      cursor: pointer;
    }
    .topic-pill:hover { border-color: #ff2442; color: #ff2442; background: #fff; }
    .topic-pill iconify-icon { display: none; }

    /* === MASONRY FEED === */
    .feed-section { padding: 12px 0; }

    .feed-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .masonry-card {
      display: block;
      border: 1px solid #eee;
      border-radius: 2px;
      overflow: hidden;
      background: #fff;
    }
    .masonry-card:hover { border-color: #ccc; }
    .masonry-card .card-img img {
      width: 100%;
      aspect-ratio: 4/3 !important;
      object-fit: cover;
    }
    .masonry-card .card-body { padding: 8px 10px 10px; }
    .masonry-card .card-title {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      color: #333;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .masonry-card .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: #999;
    }
    .card-user { display: flex; align-items: center; gap: 4px; }
    .card-user img { width: 16px; height: 16px; border-radius: 50%; }
    .card-user span { font-size: 12px; color: #999; }
    .card-like { display: flex; align-items: center; gap: 2px; font-size: 12px; color: #999; }
    .card-like iconify-icon { display: none; }
    .card-like::before { content: '\2665'; color: #ff2442; margin-right: 2px; }

    /* === TRENDING === */
    .trending-section {
      border: 1px solid #eee;
      border-radius: 2px;
      padding: 12px 16px;
      margin: 12px 0;
      background: #fafafa;
    }

    .trending-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
    .trending-item:last-child { border-bottom: none; }

    .trending-rank {
      width: 22px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: #999;
      flex-shrink: 0;
    }
    .trending-rank.top3 { color: #ff2442; }

    .trending-thumb {
      width: 48px;
      height: 48px;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .trending-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .trending-text { flex: 1; min-width: 0; }
    .trending-text h3 {
      font-size: 13px;
      font-weight: 400;
      color: #333;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .trending-text .meta { font-size: 12px; color: #999; margin-top: 2px; }
    .trending-fire { display: none; }

    /* === COLLECTIONS === */
    .collections-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .collection-card {
      display: block;
      border: 1px solid #eee;
      border-radius: 2px;
      overflow: hidden;
      background: #fff;
    }
    .collection-card:hover { border-color: #ccc; }
    .collection-card .coll-img { position: relative; overflow: hidden; }
    .collection-card .coll-img img { width: 100%; aspect-ratio: 4/3; object-fit: cover; }
    .collection-card .coll-tag {
      position: absolute;
      top: 0;
      left: 0;
      background: #ff2442;
      color: #fff;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 0;
    }
    .collection-card .coll-body { padding: 6px 8px 8px; }
    .collection-card .coll-body h3 {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.4;
      color: #333;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .collection-card .coll-meta { font-size: 12px; color: #999; margin-top: 4px; }
    .collection-card .coll-meta iconify-icon { display: none; }

    /* === FOOTER === */
    .site-footer {
      border-top: 1px solid #eee;
      padding: 16px 0;
      text-align: center;
      margin-top: 20px;
    }
    .footer-text { font-size: 12px; color: #999; }
    .footer-links { margin-top: 6px; font-size: 12px; color: #bbb; }
    .footer-links a { color: #999; margin: 0 8px; }
    .footer-links a:hover { color: #ff2442; }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .hero a { flex-direction: column; }
      .hero .hero-img { width: 100%; }
      .feed-grid { grid-template-columns: repeat(2, 1fr); }
      .collections-grid { grid-template-columns: repeat(2, 1fr); }
      .header-nav a { padding: 6px 8px; font-size: 13px; }
    }

    @media (max-width: 480px) {
      .feed-grid { grid-template-columns: 1fr; }
      .collections-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-cn">好看</span>
        <span class="logo-en">HAOKAN</span>
      </a>
      <nav class="header-nav">
        <a href="#" class="active">推荐</a>
        <a href="#">音乐</a>
        <a href="#">时尚</a>
        <a href="#">生活</a>
      </nav>
    </div>
  </header>

  <div class="wrap">

    <!-- HERO -->
    <div class="hero">
      <a href="{{HERO_LINK}}">
        <div class="hero-img">
          {{HERO_IMAGE}}
        </div>
        <div class="hero-info">
          <span class="hero-cat">{{HERO_CATEGORY}}</span>
          <h2>{{HERO_TITLE}}</h2>
          <div class="hero-meta">
            <span>{{HERO_SOURCE}}</span>
            <span>{{HERO_DATE}}</span>
          </div>
        </div>
      </a>
    </div>

    <!-- HOT TOPICS -->
    <div class="hot-topics">
      <div class="section-bar">
        <span class="section-label">热门话题</span>
      </div>
      <div class="hot-topics-list">
        {{HOT_TOPICS}}
      </div>
    </div>

    <!-- FEED -->
    <div class="feed-section">
      <div class="section-bar">
        <span class="section-label">最新资讯</span>
      </div>
      <div class="feed-grid">
        {{MASONRY_FEED}}
      </div>
    </div>

    <!-- TRENDING -->
    <div class="feed-section">
      <div class="section-bar">
        <span class="section-label">今日热榜</span>
      </div>
      <div class="trending-section">
        {{TRENDING_LIST}}
      </div>
    </div>

    <!-- COLLECTIONS -->
    <div class="feed-section">
      <div class="section-bar">
        <span class="section-label">精选合集</span>
      </div>
      <div class="collections-grid">
        {{COLLECTIONS}}
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-text">&copy; 2020-2026 好看 HAOKAN</div>
    <div class="footer-links">
      <a href="#">关于我们</a>
      <a href="#">联系方式</a>
      <a href="#">隐私政策</a>
    </div>
  </footer>

</body>
</html>
